# Sovereign AI - API Providers Configuration
# Version: 2.0.0 - February 2026
# 
# This file defines all API providers and their models.
# API keys should be set in .env file, not here.

providers:
  # ============================================
  # LOCAL - Ollama
  # ============================================
  ollama:
    name: "Ollama (Local)"
    base_url: "http://localhost:11434"
    api_key: null
    models:
      - id: "deepseek-r1:8b"
        name: "DeepSeek R1 8B"
        type: "reasoning"
        context: 128000
        capabilities: ["chat", "reasoning", "code"]
      - id: "qwen3:8b"
        name: "Qwen 3 8B"
        type: "general"
        context: 128000
        capabilities: ["chat", "code"]
      - id: "llama3.2:latest"
        name: "Llama 3.2"
        type: "general"
        context: 128000
        capabilities: ["chat"]
      - id: "nomic-embed-text:v1.5"
        name: "Nomic Embed Text"
        type: "embedding"
        context: 8192
        capabilities: ["embedding"]

  # ============================================
  # NVIDIA NIM - Free Tier
  # ============================================
  nvidia:
    name: "NVIDIA NIM"
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NVIDIA_API_KEY"
    models:
      - id: "deepseek-ai/deepseek-r1"
        name: "DeepSeek R1 (NVIDIA)"
        type: "reasoning"
        context: 128000
        capabilities: ["chat", "reasoning", "code"]
      - id: "deepseek-ai/deepseek-v3"
        name: "DeepSeek V3 (NVIDIA)"
        type: "general"
        context: 128000
        capabilities: ["chat", "code"]
      - id: "qwen/qwen3-8b"
        name: "Qwen 3 8B (NVIDIA)"
        type: "general"
        context: 128000
        capabilities: ["chat", "code"]
      - id: "nvidia/nemotron-4-340b"
        name: "Nemotron 4 340B"
        type: "general"
        context: 4096
        capabilities: ["chat"]
      - id: "meta/llama-3.3-70b"
        name: "Llama 3.3 70B (NVIDIA)"
        type: "general"
        context: 128000
        capabilities: ["chat", "code"]

  # ============================================
  # GROQ - Fast Inference
  # ============================================
  groq:
    name: "Groq"
    base_url: "https://api.groq.com/openai/v1"
    api_key_env: "GROQ_API_KEY"
    models:
      - id: "llama-3.3-70b-versatile"
        name: "Llama 3.3 70B (Groq)"
        type: "general"
        context: 128000
        capabilities: ["chat", "code"]
      - id: "deepseek-r1-distill-llama-70b"
        name: "DeepSeek R1 Distill 70B (Groq)"
        type: "reasoning"
        context: 128000
        capabilities: ["chat", "reasoning", "code"]
      - id: "qwen-qwq-32b"
        name: "Qwen QwQ 32B (Groq)"
        type: "reasoning"
        context: 32768
        capabilities: ["chat", "reasoning"]

  # ============================================
  # GOOGLE AI STUDIO - Gemini
  # ============================================
  google:
    name: "Google AI Studio"
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    api_key_env: "GOOGLE_API_KEY"
    models:
      - id: "gemini-2.5-flash"
        name: "Gemini 2.5 Flash"
        type: "general"
        context: 1000000
        capabilities: ["chat", "code", "vision"]
      - id: "gemini-2.5-pro"
        name: "Gemini 2.5 Pro"
        type: "general"
        context: 2000000
        capabilities: ["chat", "code", "vision", "reasoning"]

  # ============================================
  # MISTRAL
  # ============================================
  mistral:
    name: "Mistral"
    base_url: "https://api.mistral.ai/v1"
    api_key_env: "MISTRAL_API_KEY"
    models:
      - id: "mistral-large-latest"
        name: "Mistral Large"
        type: "general"
        context: 128000
        capabilities: ["chat", "code"]
      - id: "codestral-latest"
        name: "Codestral"
        type: "code"
        context: 32768
        capabilities: ["code"]
      - id: "ministral-8b-latest"
        name: "Ministral 8B"
        type: "general"
        context: 128000
        capabilities: ["chat"]

  # ============================================
  # OPENAI
  # ============================================
  openai:
    name: "OpenAI"
    base_url: "https://api.openai.com/v1"
    api_key_env: "OPENAI_API_KEY"
    models:
      - id: "gpt-4o"
        name: "GPT-4o"
        type: "general"
        context: 128000
        capabilities: ["chat", "code", "vision"]
      - id: "gpt-4o-mini"
        name: "GPT-4o Mini"
        type: "general"
        context: 128000
        capabilities: ["chat", "code"]
      - id: "o1"
        name: "o1"
        type: "reasoning"
        context: 200000
        capabilities: ["chat", "reasoning", "code"]
      - id: "o3-mini"
        name: "o3-mini"
        type: "reasoning"
        context: 200000
        capabilities: ["chat", "reasoning", "code"]
      - id: "dall-e-3"
        name: "DALL-E 3"
        type: "image"
        context: null
        capabilities: ["image-generation"]

  # ============================================
  # ANTHROPIC
  # ============================================
  anthropic:
    name: "Anthropic"
    base_url: "https://api.anthropic.com/v1"
    api_key_env: "ANTHROPIC_API_KEY"
    models:
      - id: "claude-sonnet-4-20250514"
        name: "Claude Sonnet 4"
        type: "general"
        context: 200000
        capabilities: ["chat", "code", "vision"]
      - id: "claude-opus-4-20250514"
        name: "Claude Opus 4"
        type: "general"
        context: 200000
        capabilities: ["chat", "code", "vision", "reasoning"]

  # ============================================
  # OPENROUTER - Aggregator
  # ============================================
  openrouter:
    name: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    models:
      - id: "openrouter/auto"
        name: "Auto (Smartest)"
        type: "general"
        context: null
        capabilities: ["chat", "code"]
      # OpenRouter provides access to all models via single API

  # ============================================
  # COHERE
  # ============================================
  cohere:
    name: "Cohere"
    base_url: "https://api.cohere.ai/v1"
    api_key_env: "COHERE_API_KEY"
    models:
      - id: "command-r-plus"
        name: "Command R+"
        type: "general"
        context: 128000
        capabilities: ["chat", "code"]
      - id: "command-r"
        name: "Command R"
        type: "general"
        context: 128000
        capabilities: ["chat"]

# ============================================
# MODEL ROUTING RULES
# ============================================
routing:
  # Default model for each task type
  defaults:
    chat: "ollama:deepseek-r1:8b"
    code: "ollama:qwen3:8b"
    reasoning: "ollama:deepseek-r1:8b"
    embedding: "ollama:nomic-embed-text:v1.5"
    image: "openai:dall-e-3"
    vision: "google:gemini-2.5-flash"
  
  # Fallback chain when local is unavailable
  fallbacks:
    - provider: "nvidia"
      model: "deepseek-ai/deepseek-r1"
    - provider: "groq"
      model: "llama-3.3-70b-versatile"
    - provider: "openrouter"
      model: "openrouter/auto"
  
  # Task-specific routing
  tasks:
    quick_question:
      preferred: "ollama:llama3.2:latest"
      fallback: "groq:llama-3.3-70b-versatile"
    
    complex_reasoning:
      preferred: "ollama:deepseek-r1:8b"
      fallback: "nvidia:deepseek-ai/deepseek-r1"
    
    code_generation:
      preferred: "ollama:qwen3:8b"
      fallback: "mistral:codestral-latest"
    
    long_document:
      preferred: "google:gemini-2.5-flash"
      fallback: "anthropic:claude-sonnet-4-20250514"
    
    image_generation:
      preferred: "openai:dall-e-3"
      fallback: null