# Sovereign AI - Complete AI Workstation Stack
# Version: 2.1.0 - February 2026
#
# Services:
#   - OpenWebUI (Port 3000): Main AI interface
#   - Host Ollama (Port 11434): Local LLM inference
#   - MCPO (Port 8000): MCP OpenAPI Proxy
#   - OpenMemory (Port 8765): Mem0 local memory service
#   - Open Notebook (Port 8502): Research notebook
#   - Qdrant (Port 6333): Vector database
#   - Redis (Port 6379): Caching layer

networks:
  sovereign-net:
    driver: bridge

volumes:
  openwebui-data:
  qdrant-data:
  redis-data:
  mem0-data:

services:
  # ============================================
  # OPENWEBUI - Main AI Interface
  # ============================================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - openwebui-data:/app/backend/data
      - ./data/rag-docs:/app/backend/data/docs
      - ./tools:/app/backend/data/tools
      - ./functions:/app/backend/data/functions
      - ./configs/theme.css:/app/build/static/custom.css:ro
    environment:
      # Core
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENV=prod
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_NAME=Sovereign AI
      - WEBUI_URL=http://localhost:3000

      # RAG Configuration
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text:v1.5
      - RAG_EMBEDDING_BATCH_SIZE=50
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=100

      # Web Search (Brave)
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=brave
      - BRAVE_SEARCH_API_KEY=${BRAVE_API_KEY:-}
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=5

      # Code Execution
      - ENABLE_CODE_EXECUTION=true
      - CODE_EXECUTION_ENGINE=pyodide

      # Image Generation
      - ENABLE_IMAGE_GENERATION=true
      - IMAGE_GENERATION_ENGINE=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - IMAGE_SIZE=1024x1024
      - IMAGE_STEPS=50

      # Memory
      - ENABLE_MEMORY=true

      # Voice/Audio
      - AUDIO_STT_ENGINE=whisper
      - AUDIO_TTS_ENGINE=openai
      - OPENAI_API_BASE_URL=https://api.openai.com/v1

      # Features
      - ENABLE_COMMUNITY_SHARING=true
      - ENABLE_EVALUATION_ARENA=true
      - ENABLE_NOTES=true
      - ENABLE_CHANNELS=true
      - ENABLE_USER_WEBHOOKS=true

      # Security
      - ENABLE_ADMIN_EXPORT=true
      - ENABLE_ADMIN_CHAT_ACCESS=true
      - SAFE_MODE=false

      # Multi-provider OpenAI-compatible APIs (comma-separated, matched by position)
      - OPENAI_API_BASE_URLS=${OPENAI_API_BASE_URLS:-https://api.openai.com/v1}
      - OPENAI_API_KEYS=${OPENAI_API_KEYS:-${OPENAI_API_KEY:-}}

      # Cloud provider keys (native OpenWebUI integrations)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sovereign-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ============================================
  # MCPO - MCP OpenAPI Proxy
  # ============================================
  mcpo:
    build:
      context: .
      dockerfile: Dockerfile.mcpo
    container_name: mcpo
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./configs/mcpo-config.json:/app/config.json:ro
      - ./mcp-servers:/app/mcp-servers:ro
      - ${HOST_WORK_DIR:-.}:/workspace:rw
      - ./data/memory:/app/memory:rw
      - ./logs/mcpo:/app/logs:rw
    environment:
      - NPM_CONFIG_CACHE=/tmp/.npm
      - UV_CACHE_DIR=/tmp/.uv
      - HOST_WORK_DIR=/workspace
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sovereign-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # OPENMEMORY (Mem0) - Local Memory Service
  # ============================================
  mem0:
    image: mem0/openmemory-mcp:latest
    container_name: mem0
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - mem0-data:/app/data
      - ./data/memory:/app/memory:rw
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_PROVIDER=openai
      - LLM_MODEL=gpt-4o-mini
      - EMBEDDING_MODEL=text-embedding-3-small
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sovereign-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # SURREALDB - Open Notebook Metadata Store
  # ============================================
  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: surrealdb
    restart: unless-stopped
    command: start --log info --user notebook_admin --pass ${NOTEBOOK_SECRET_KEY} rocksdb:/mydata/open-notebook.db
    user: root
    volumes:
      - ./data/notebook-db:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sovereign-net

  # ============================================
  # OPEN NOTEBOOK - Research Notebook
  # ============================================
  open-notebook:
    image: lfnovo/open_notebook:v1-latest
    container_name: open-notebook
    restart: unless-stopped
    ports:
      - "8502:8502"
    volumes:
      - ./data/notebook:/app/data
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${NOTEBOOK_SECRET_KEY}
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=notebook_admin
      - SURREAL_PASSWORD=${NOTEBOOK_SECRET_KEY}
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sovereign-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - surrealdb

  # ============================================
  # QDRANT - Vector Database
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================
  # REDIS - Caching Layer
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sovereign-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # SOVEREIGN AGENT - Autonomous Agent (optional)
  # Start with: docker compose --profile agent up -d
  # ============================================
  sovereign-agent:
    build:
      context: ./mcp-servers/sovereign-agent
      dockerfile: Dockerfile
    container_name: sovereign-agent
    restart: unless-stopped
    volumes:
      - ${HOST_WORK_DIR:-.}:/workspace:rw
      - ./data/agent-logs:/app/logs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MODEL_NAME=deepseek-r1:8b
      - LOG_LEVEL=INFO
      - SAFETY_LEVEL=standard
      - CONFIRMATION_REQUIRED=true
      - LOG_DIR=/app/logs
      - WORK_DIR=/workspace
    networks:
      - sovereign-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - agent
